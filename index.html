<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FRIED LIVER SOCIETY</title>
    <style>
        body { background: #1b1b1b; color: #ffffff; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; margin: 0; padding: 10px; }
        .container { border: 2px solid #e67e22; border-radius: 8px; padding: 15px; background: #262421; }
        .header { text-align: center; border-bottom: 1px solid #444; margin-bottom: 15px; padding-bottom: 10px; }
        .header h2 { margin: 0; color: #e67e22; font-size: 18px; text-transform: uppercase; }
        .section-title { font-size: 14px; color: #999; margin-bottom: 10px; font-weight: bold; }
        .member-list { display: flex; flex-direction: column; gap: 8px; }
        .member-card { background: #312e2b; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #e67e22; }
        .username { font-weight: bold; color: #fff; }
        .status { font-size: 11px; color: #999; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🍳 THE FRIED LIVER SOCIETY</h2>
    </div>
    <div class="section-title">🔥 NEW ARRIVALS</div>
    <div id="members" class="member-list">
        <div style="text-align:center;">Sizzling the data...</div>
    </div>
</div>

<script>
    const CLUB_SLUG = 'the-fried-liver-society';

    async function getNewMembers() {
        try {
            const response = await fetch(`https://api.chess.com/pub/club/${CLUB_SLUG}/members`);
            const data = await response.json();
            const all = [...data.weekly, ...data.monthly, ...data.all_time];
            
            // Sort by joined date descending
            all.sort((a, b) => b.joined - a.joined);
            const newestArrivals = all.slice(0, 8);
            
            const container = document.getElementById('members');
            container.innerHTML = '';

            newestArrivals.forEach(m => {
                const dateJoined = new Date(m.joined * 1000);
                // This creates the Time format (e.g., 4:30 PM)
                const timeStr = dateJoined.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = dateJoined.toLocaleDateString();

                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <span class="username">@${m.username}</span>
                    <span class="status">${dateStr}<br>${timeStr}</span>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('members').innerHTML = "Failed to load.";
        }
    }
    getNewMembers();
</script>

</body>
</html>
