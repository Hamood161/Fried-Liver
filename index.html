<script>
    const CLUB_SLUG = 'the-fried-liver-society';

    async function getNewMembers() {
        try {
            const response = await fetch(`https://api.chess.com/pub/club/${CLUB_SLUG}/members`);
            const data = await response.json();
            
            // Combines all lists and sorts them by join date
            const all = [...data.weekly, ...data.monthly, ...data.all_time];
            all.sort((a, b) => b.joined - a.joined);

            const newestArrivals = all.slice(0, 8);
            
            const container = document.getElementById('members');
            container.innerHTML = '';

            newestArrivals.forEach(m => {
                const card = document.createElement('div');
                card.className = 'member-card';
                card.innerHTML = `
                    <span class="username">@${m.username}</span>
                    <span class="status">${new Date(m.joined * 1000).toLocaleDateString()}</span>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('members').innerHTML = "Failed to load chefs.";
        }
    }
    getNewMembers();
</script>
