<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fried Liver Society Sidebar</title>
    <style>
        /* Theme Colors: Deep Brown, Burnt Orange, and Gold */
        body {
            background: linear-gradient(180deg, #2b1710 0%, #000000 100%);
            color: #f1c40f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            border: 2px solid #e67e22;
            border-radius: 12px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .header {
            text-align: center;
            border-bottom: 1px solid #e67e22;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e67e22;
        }

        .section-title {
            font-size: 0.9rem;
            color: #bdc3c7;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #e67e22;
            transition: transform 0.2s;
        }

        .member-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.1);
        }

        .username {
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        .status {
            font-size: 0.75rem;
            color: #95a5a6;
        }

        .loading {
            text-align: center;
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🍳 THE FRIED LIVER SOCIETY</h2>
    </div>

    <div class="section-title">
        🔥 New Arrivals
    </div>

    <div id="members" class="member-list">
        <div class="loading">Sizzling the data...</div>
    </div>
</div>

<script>
    // Config for your club
    const CLUB_SLUG = 'the-fried-liver-society';

    async function getNewMembers() {
        try {
            const response = await fetch(`https://api.chess.com/pub/club/${CLUB_SLUG}/members`);
            const data = await response.json();
            
            // Get the 5 most recent members from the 'weekly' list
            const recentOnes = data.weekly.slice(0, 8);
            const container = document.getElementById('members');
            container.innerHTML = '';

            recentOnes.forEach(m => {
                const card = document.createElement('div');
                card.className = 'member-card';
               card.innerHTML = `
    <span class="username">@${m.username}</span>
    <span class="status">${new Date(m.joined * 1000).toLocaleDateString()}</span>
`;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('members').innerHTML = "Failed to load members.";
        }
    }

    getNewMembers();
</script>

</body>
</html>
